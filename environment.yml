name: fvab-basket

channels:
  - conda-forge

dependencies:
  - python=3.10
  - pip

  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - scikit-learn

  # Visualization
  - matplotlib
  - seaborn

  # Computer vision and media
  - opencv
  - pillow
  - ffmpeg

  # CLI and configuration
  - pyyaml
  - tqdm

  # Notebook / VS Code support
  - ipykernel

  - pip:
      # Deep learning
      - torch
      - torchvision
      - torchmetrics
      - timm

      # Model utilities
      - huggingface-hub
      - safetensors

      # CLI utilities
      - rich
      - typer
